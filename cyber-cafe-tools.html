    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, onSnapshot, query, where, getDocs, doc, getDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBADp9soMrkd-Ld_OrdSSfU1Kqh3JYh8xc",
            authDomain: "bihar-sin.firebaseapp.com",
            projectId: "bihar-sin",
            storageBucket: "bihar-sin.firebasestorage.app",
            messagingSenderId: "735677527044",
            appId: "1:735677527044:web:652614ef88a5cf470b7151"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FETCH DYNAMIC ADS LOGIC ONLY ---
        window.activeAdsList = [];
        let adInterval = null;
        let currentAdIndex = 0;

        window.fetchAds = async () => {
            const adContainer = document.getElementById('dynamic-ad-container');
            const loader = document.getElementById('ad-loader');
            
            if (adInterval) clearInterval(adInterval);
            window.activeAdsList = [];
            
            try {
                const q = query(
                    collection(db, "artifacts", "bihar-sin-portal", "public", "data", "ads"),
                    where("isActive", "==", true)
                );

                const snap = await getDocs(q);
                
                const today = new Date().toISOString().split('T')[0];
                snap.forEach((doc) => {
                    const data = doc.data();
                    const start = data.startDate || "0000-00-00";
                    const end = data.endDate || "9999-12-31";
                    
                    if (today >= start && today <= end) {
                        // Skipping video checking here, just taking image ads
                        if (!data.videoUrl || !data.videoUrl.includes('youtube')) {
                            window.activeAdsList.push(data);
                        }
                    }
                });

                if (window.activeAdsList.length > 0 && adContainer) {
                    adContainer.classList.remove('hidden');
                    if(loader) loader.classList.add('hidden');
                    startAdSlideshow();
                } else if (adContainer) {
                    adContainer.classList.add('hidden');
                }

            } catch (err) {
                console.log("Ad Fetch Error:", err);
                if(adContainer) adContainer.classList.add('hidden');
            }
        };

        window.startAdSlideshow = () => {
            currentAdIndex = 0;
            renderAd(currentAdIndex);
            if (window.activeAdsList.length > 1) {
                adInterval = setInterval(() => {
                    currentAdIndex = (currentAdIndex + 1) % window.activeAdsList.length;
                    renderAd(currentAdIndex);
                }, 4000); 
            }
        };

        window.renderAd = (index) => {
            const ad = window.activeAdsList[index];
            const img = document.getElementById('ad-display-img');
            const link = document.getElementById('ad-click-link');
            if(img && link) {
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = ad.mediaUrl;
                    link.href = ad.targetUrl || "#";
                    img.onload = () => { img.style.opacity = '1'; };
                    setTimeout(() => img.style.opacity = '1', 100);
                }, 350); 
            }
        };

        // Initial Load
        window.onload = function() {
            lucide.createIcons();
            if(window.fetchAds) window.fetchAds();
        };
    </script>
